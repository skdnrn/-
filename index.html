<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シンプルガチャゲーム</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    margin: 0;
    padding: 0;
}

h1 {
    margin-top: 40px;
}

.gacha-container {
    margin-top: 40px;
}

button {
    padding: 15px 40px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background-color: gold;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    background-color: orange;
}

.result {
    margin-top: 40px;
    font-size: 28px;
    font-weight: bold;
}

.rarity {
    margin-top: 10px;
    font-size: 22px;
}
</style>
</head>

<body>

<h1>🎮 スマホ風ガチャゲーム 🎮</h1>

<div class="gacha-container">
    <button onclick="drawGacha()">ガチャを引く！</button>

    <div class="result" id="result">ここに結果が表示されます</div>
    <div class="rarity" id="rarity"></div>
</div>

<script>
const characters = [
    { name: "スライム", rarity: "★", probability: 50 },
    { name: "ナイト", rarity: "★★", probability: 30 },
    { name: "ドラゴン", rarity: "★★★", probability: 15 },
    { name: "伝説の勇者", rarity: "★★★★", probability: 5 }
];

function drawGacha() {
    let random = Math.random() * 100;
    let cumulative = 0;

    for (let i = 0; i < characters.length; i++) {
        cumulative += characters[i].probability;
        if (random < cumulative) {
            document.getElementById("result").textContent = characters[i].name;
            document.getElementById("rarity").textContent = "レア度: " + characters[i].rarity;

            // レア演出
            if (characters[i].probability <= 5) {
                alert("✨ 超激レア！！！ ✨");
            }

            break;
        }
    }
}
</script>

</body>
</html>
